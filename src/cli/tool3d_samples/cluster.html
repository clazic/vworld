<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Cluster</title>
<!-- 지도 로드하기 -->
<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=@{apikey}"></script>

<!-- 클러스터 API -->
<script src="https://map.vworld.kr/js/dtkmap/tool3d/libapis/cluster/cluster_api.js"></script>
</head>
<body>
  <div id="vmap" style="width:100%;height:350px;left:0px;top:0px"></div>
  색상 : <input type="color" id="clusterColor" value="#3399CC">
  클러스터 거리(px) :  <input id="clusterPixelRange" value="50" min="1" style="width:70px;">
  최소 개수 :  <input id="clusterMinSize" value="1" min="1" style="width:50px;">
  <button id="clusterBtn">클러스터 가시화</button>
  
  <div id = "result" style="margin-top: 20px;">
    <h3>분석 결과:</h3>
  </div>
   
<script type="text/javascript">
  let vworldMap;
  let clusterApi;   // ClusterLayer3D 인스턴스
  let clusterOn = false;

  // 1) vWorld 지도 초기화
  function vwmap(){
    const options = {
      mapId : "vmap",
      initPosition: new vw.CameraPosition(
        new vw.CoordZ(126.923100000039,37.5262083301207,2000),
        new vw.Direction(0, -90, 0)
      ),
      logo: true,
      navigation: false
    };

    vworldMap = new vw.Map();
    vworldMap.setOption(options);
    vworldMap.start();
  }
  vwmap();

  // 2) 예시 데이터 
  const data = [
    {"id": 1,  "lat": 37.5262, "lon": 126.9239, "weight": 72},
    {"id": 2,  "lat": 37.5250, "lon": 126.9251, "weight": 55},
    {"id": 3,  "lat": 37.5241, "lon": 126.9228, "weight": 43},
    {"id": 4,  "lat": 37.5233, "lon": 126.9276, "weight": 66},
    {"id": 5,  "lat": 37.5220, "lon": 126.9292, "weight": 38},
    {"id": 6,  "lat": 37.5212, "lon": 126.9325, "weight": 81},
    {"id": 7,  "lat": 37.5203, "lon": 126.9341, "weight": 64},
    {"id": 8,  "lat": 37.5194, "lon": 126.9386, "weight": 90},
    {"id": 9,  "lat": 37.5201, "lon": 126.9418, "weight": 52},
    {"id": 10, "lat": 37.5215, "lon": 126.9446, "weight": 47},
    {"id": 11, "lat": 37.5230, "lon": 126.9462, "weight": 35},
    {"id": 12, "lat": 37.5255, "lon": 126.9449, "weight": 68},
    {"id": 13, "lat": 37.5274, "lon": 126.9417, "weight": 58},
    {"id": 14, "lat": 37.5282, "lon": 126.9379, "weight": 73},
    {"id": 15, "lat": 37.5289, "lon": 126.9340, "weight": 61},
    {"id": 16, "lat": 37.5295, "lon": 126.9303, "weight": 49},
    {"id": 17, "lat": 37.5308, "lon": 126.9274, "weight": 44},
    {"id": 18, "lat": 37.5316, "lon": 126.9230, "weight": 77},
    {"id": 19, "lat": 37.5324, "lon": 126.9198, "weight": 62},
    {"id": 20, "lat": 37.5312, "lon": 126.9169, "weight": 40},
    {"id": 21, "lat": 37.5297, "lon": 126.9157, "weight": 54},
    {"id": 22, "lat": 37.5279, "lon": 126.9168, "weight": 59},
    {"id": 23, "lat": 37.5266, "lon": 126.9194, "weight": 71},
    {"id": 24, "lat": 37.5249, "lon": 126.9209, "weight": 46}
  ];

  // 3) 버튼 이벤트 + ClusterLayer3D 사용
  document.addEventListener("DOMContentLoaded", function() {

    document.querySelector("#clusterBtn").addEventListener("click", function() {
      const colorInput  = document.querySelector("#clusterColor");
      const pixelInput  = document.querySelector("#clusterPixelRange");
      const minSizeInput = document.querySelector("#clusterMinSize");

      const color = (colorInput && colorInput.value) || "#3399CC";
      const pixelRange = pixelInput && pixelInput.value
        ? parseInt(pixelInput.value, 10) : 50;
      const minimumClusterSize = minSizeInput && minSizeInput.value
        ? parseInt(minSizeInput.value, 10) : 1;

        vworldMap._wsViewer.dataSources.removeAll();

      clusterApi = new ClusterLayer3D("clusterLayer", {
        color,
        pixelRange,
        minimumClusterSize
      });

      clusterApi.toggle(data);   

      const on = clusterApi.isOn();
      document.getElementById("result").innerHTML = `
        <h3>분석 결과:</h3>
        <p>총 ${data.length}개의 데이터 포인트가 클러스터링되었습니다.</p>
        <p>클러스터 레이어 상태: <b>${on ? 'ON' : 'OFF'}</b></p>
      `;
    });
  });
</script>
</body>
</html>
