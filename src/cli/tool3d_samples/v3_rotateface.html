<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>roll</title>
<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=@{apikey}"></script>
</head>

<body>
 <div id="vmap" style="width:100%;height:350px;left:0px;top:0px"></div>
<table id="ROLL_TABLE" style="display: block;">
  <tr>
    <td><td colspan="2"><input type="button" onclick="regRollEvent()" value="위치지정"></td>
    <td><input type="button" onclick="rollControl('start')" value="Roll시작"></td>
    <td><input type="button" onclick="rollControl('stop')" value="Roll정지"></td>
  </tr>
</table>
<script>

    var options = {
    mapId: "vmap",
    initPosition: new vw.CameraPosition(
        new vw.CoordZ(126.79071928185927, 37.56074342381346, 5000.0),
        new vw.Direction(0, -60, 0)
    ),
    logo: true,
    navigation: true
};

	var map = new vw.Map();
	map.setOption(options);
	map.start();
    
    var roll;
    
    function regRollEvent(){
      var eventRemover = map.onClick.addEventListener(rollEvent);  
    }

    function rollEvent( windowposition, ecefposition, cartographic, featureInfo ){
      var loc = new vw.CoordZ(vw.Util.toDegrees(cartographic.longitude), vw.Util.toDegrees(cartographic.latitude), 0);
      rollControl('setLocation',loc);
    }
    
    function rollControl(flag,loc){
      if(flag == 'setLocation'){
        if(roll == null){
          var a = new vw.Direction(90,0,0);
          var dp = new vw.DevicePosition(loc,a);
          roll = new vw.cameraAction.Roll(dp);  
          roll.setHeadingSpeed(10);
          roll.setTiltSpeed(5);
        }else{
          var a = new vw.Direction(90,0,0);
          var dp = new vw.DevicePosition(loc,a);      
             roll.setPosition(dp);         
        }    
      }else if(flag == 'start'){       
        roll.start();
      }else if(flag == 'stop'){
        roll.stop();
        map.lookat.moveTo(mapOptions.initPosition); //초기위치이동
      }
    }
</script>
</body>
</html>
