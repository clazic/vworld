<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Rotate</title>
<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=@{apikey}"></script>
</head>

<body>
 <div id="vmap" style="width:100%;height:350px;left:0px;top:0px"></div>
<table id="ROTATE_TABLE" style="display: block;">
  <tr>
    <td><td colspan="2"><input type="button" onclick="regRotateEvent()" value="위치지정"></td>
    <td><input type="button" onclick="rotateControl('start')" value="Rotate시작"></td>
    <td><input type="button" onclick="rotateControl('stop')" value="Rotate정지"></td>
  </tr>
</table>
<script>

	var options = {
		mapId: "vmap",
		initPosition: new vw.CameraPosition(
			new vw.CoordZ(126.79071928185927, 37.56074342381346, 5000.0),
			new vw.Direction(0, -60, 0)
		),
		logo: true,
		navigation: true
	};

	var map = new vw.Map();
	map.setOption(options);
	map.start();
    
    var rotate;
    
    function regRotateEvent(){
      var eventRemover = map.onClick.addEventListener(rotateEvent);  
    }

    function rotateEvent( windowposition, ecefposition, cartographic, featureInfo ){
      var loc = new vw.CoordZ(vw.Util.toDegrees(cartographic.longitude), vw.Util.toDegrees(cartographic.latitude), 0);
      rotateControl("setLocation",loc, cartographic.height);
    }
    
    function rotateControl(flag,loc,_altitude){
      if(flag == "setLocation"){
        if(rotate == null){
          rotate = new vw.cameraAction.Rotate(loc, _altitude);
          rotate.setSpeed(-10);
        }else{      
             rotate.setTarget(loc);
             rotate.setDistance(_altitude);
        }    
      }else if(flag == "start"){       
        rotate.start();
      }else if(flag == "stop"){
        rotate.stop();
      }
    }
</script>
</body>
</html>
