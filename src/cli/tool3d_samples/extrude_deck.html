<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D Extrude</title>
<style>html,body,#map{margin:0;height:100%;width:100%;overflow:hidden;background:#1a1a2e}</style>
<script src="https://unpkg.com/deck.gl@8.9.35/dist.min.js"></script>
</head>
<body>
<div id="map"></div>
<script>
const EXTRUDE_DATA = __DATA__;

__COLOR_FN__

__ELEV_FN__

function hexToRgb(h,a){
  if(!h||h.length<7) return [200,200,200,a||200];
  var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return [r,g,b,a||200];
}

new deck.DeckGL({
  container:'map',
  initialViewState:{
    longitude:__LON__,
    latitude:__LAT__,
    zoom:__ZOOM__,
    pitch:__PITCH__,
    bearing:30,
    minZoom:0,
    maxZoom:19
  },
  controller:true,
  layers:[
    new deck.TileLayer({
      data:'https://api.vworld.kr/req/wmts/1.0.0/__KEY__/Base/{z}/{y}/{x}.png',
      minZoom:0,
      maxZoom:19,
      tileSize:256,
      renderSubLayers:function(p){
        return new deck.BitmapLayer(p,{
          data:null,
          image:p.tile.data,
          bounds:[p.tile.bbox.west,p.tile.bbox.south,p.tile.bbox.east,p.tile.bbox.north]
        });
      }
    }),
    new deck.GeoJsonLayer({
      id:'extrude',
      data:EXTRUDE_DATA,
      extruded:true,
      wireframe:true,
      getElevation:function(f){ return vwElev(f.properties['__EFIELD__']); },
      getFillColor:function(f){ return hexToRgb(vwColor(f.properties['__VFIELD__']),__OPACITY_INT__); },
      getLineColor:[255,255,255,80],
      opacity:__OPACITY__,
      pickable:true,
      onClick:function(info){
        if(info.object){
          var vf=info.object.properties['__VFIELD__'];
          var ef=info.object.properties['__EFIELD__'];
          var nm=info.object.properties['adm_nm']||info.object.properties['name']||info.object.properties['NAME']||'';
          var msg=(nm?nm+': ':'')+'값: '+(vf!=null?Number(vf).toLocaleString('ko-KR'):'없음')+' / 높이기준: '+(ef!=null?Number(ef).toLocaleString('ko-KR'):'없음');
          showToast(msg);
        }
      }
    })
  ]
});

function showToast(msg){
  var t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(25,31,40,0.88);color:#fff;padding:10px 18px;border-radius:8px;z-index:9999;pointer-events:none;font-family:Pretendard,-apple-system,sans-serif;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.3)';
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},2500);
}
</script>
__LEGEND__
</body>
</html>
