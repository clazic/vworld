<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>showHexbin</title>
<!-- 지도 로드하기 -->
<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=@{apikey}"></script>

<!-- 분석 기능 로드하기  -->

<script type="module">
  import CustomVerticalBarPrimitiveLoader
    from 'https://map.vworld.kr/js/dtkmap/tool3d/libapis/customVerticalBarPrimitive/customVerticalBarPrimitiveLoader.esm.js';
  window.CustomVerticalBarPrimitiveLoader = CustomVerticalBarPrimitiveLoader;
</script>
<script src="https://map.vworld.kr/js/dtkmap/tool3d/libapis/customVerticalBarPrimitive/customVerticalBarPrimitive_api.js"></script>

</head>
<body>
  <div id="vmap" style="width:100%;height:350px;left:0px;top:0px"></div>
  막대 최소 높이:  <input type="number" id="barMin" value="100" style="width:70px;">
  막대 최대 높이:  <input type="number" id="barMax" value="2000" style="width:80px;">
  막대 크기 배율:  <input type="number" id="radiusScale" value="2.0" step="0.1" style="width:60px;">
  <button id="hexbinBtnn">Hexbin 가시화</button>
  <div id="hexbinResult" style="margin-top: 20px;">
    <h3>분석 결과:</h3>
   </div>

<script type="text/javascript">
function vwmap() {
  var options = {
    mapId : "vmap",
    initPosition: new vw.CameraPosition(
      new vw.CoordZ(126.923100000039,37.5262083301207,2000),
      new vw.Direction(0, -90, 0)
    ),
    logo: true,
    navigation: false
  };
  var map = new vw.Map();
  map.setOption(options);
  map.start();
}
vwmap();

document.querySelector("#hexbinBtnn")?.addEventListener("click", function () {
    const minInput   = document.getElementById("barMin");
    const maxInput   = document.getElementById("barMax");
    const radiusInput = document.getElementById("radiusScale");

    let barHeightMin = parseFloat(minInput?.value);
    let barHeightMax = parseFloat(maxInput?.value);
    let radiusScale  = parseFloat(radiusInput?.value);

    ws3d.viewer.scene.primitives.removeAll()

    barManager = new CustomVerticalBarPrimitiveManager({
        barHeightMin: barHeightMin,
        barHeightMax: barHeightMax,
        radiusScale : radiusScale,
        palette     : ["#00FFFF","#FFFF00","#FF0000"]
    });
	barManager.addHexbinLayer(data, { resultElementId: "hexbinResult" });
});

// 예시 데이터
