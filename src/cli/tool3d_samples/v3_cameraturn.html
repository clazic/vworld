<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Direction</title>
    <script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=@{apikey}"></script>
</head>

<body>
    <div id="vmap" style="width:100%;height:350px;left:0px;top:0px"></div>
    DIRECTION <table id="DIRECTION_TABLE" style="display:block">
        <tr>
            <td>여의도</td>
            <td><input type="button" onclick="vwDirectionEast()" value="동쪽"></td>
            <td><input type="button" onclick="vwDirectionWest()" value="서쪽"></td>
            <td><input type="button" onclick="vwDirectionNorth()" value="북쪽"></td>
            <td><input type="button" onclick="vwDirectionSouth()" value="남쪽"></td>
            <td><input type="button" onclick="vwDirectionGround()" value="지면"></td>
            <td><input type="button" onclick="vwDirectionFront()" value="정면"></td>
        </tr>
    </table>

    <script type="text/javascript">
        var map;

        var hX = 127.425;
        var hY = 38.196;
        var hZ = 13487000;
        var hH = 0;
        var hT = -90;
        var hR = 0;

        var sX = 126.92529813255122;
        var sY = 37.52509165877161;
        var sZ = 10000;
        var sH = 0;
        var sT = -50;
        var sR = 0;

        var options = {
            mapId: "vmap",
            initPosition: new vw.CameraPosition(
                new vw.CoordZ(sX, sY, sZ),
                new vw.Direction(sH, sT, sR)
            ),
            logo: true,
            navigation: true
        };

        map = new vw.Map();
        map.setOption(options);
        map.start();


        var east = 90,
            west = -90,
            south = 180,
            north = 0,
            ground = -90,
            front = 0;

        function cameraPosition(Heading, Tilt) {
            return new vw.CameraPosition(new vw.CoordZ(sX, sY, sZ), new vw.Direction(Heading, Tilt, sR));
        }

        function vwDirectionEast() {
            map.lookat.moveTo(cameraPosition(east, sT));
        }

        function vwDirectionWest() {
            map.lookat.moveTo(cameraPosition(west, sT));
        }

        function vwDirectionNorth() {
            map.lookat.moveTo(cameraPosition(north, sT));
        }

        function vwDirectionSouth() {
            map.lookat.moveTo(cameraPosition(south, sT));
        }

        function vwDirectionGround() {
            map.lookat.moveTo(cameraPosition(sH, ground));
        }

        function vwDirectionFront() {
            sZ = 100;
            map.lookat.moveTo(cameraPosition(sH, front));
            sZ = 5000;
        }
    </script>
</body>

</html>
