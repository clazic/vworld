<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MOBILE WebGL VER 3.0</title>
<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=@{apikey}"></script>
</head>
<body>
<div id="vmap" style="width:100%;height:98%;left:0px;top:0px"></div>
<select id="mapmode" onChange="javscript:chgMapMode(this.value);">
	<option value='3d-map'>3D</option>
	<option value='2d-map'>2D</option>
</select>
<script type="text/javascript">

function chgMapMode(value) {
	mapController.setMode( value );
}

	vw.MapControllerOption = {
			container : "vmap",
			mapMode : "ws3d-map",
			basemapType : vw.ol3.BasemapType.GRAPHIC,
			controlDensity : vw.ol3.DensityType.BASIC,
			interactionDensity : vw.ol3.DensityType.BASIC,
			controlsAutoArrange : true,
			homePosition : vw.ol3.CameraPosition,
			initPosition : vw.ol3.CameraPosition,
		};
		mapController = new vw.MapController(vw.MapControllerOption);
	
	// 제목 : 반응형 웹에서 웹지엘 지도 API 3.0 사용
	// 1. 모바일용 지도의 전체 크기를 width: 100%, height: 100%로 적용하며,
	// head 안에 meta태그를 아래와 같이 구성합니다.
	/* <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"> */
	// 2. api 사용 방식은 PC용과 동일하게 구성됩니다.
	
</script>
</body>
</html>
