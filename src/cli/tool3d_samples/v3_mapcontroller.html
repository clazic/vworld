<!DOCTYPE html>									
<html>									
<head>									
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MapController</title>
<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=@{apikey}"></script>
</head>
<body>
<div id="vmap" style="width:100%;height:350px;left:0px;top:0px"></div>
  <select id="mapmode" onChange="mapController.setMode(this.value)">
	<option value='3d-map'>3d-map</option>
	<option value='2d-map'>2d-map</option> 
  </select>
<script type="text/javascript">
  vw.MapControllerOption = {
      container : "vmap",
      mapMode : "ws3d-map",
      basemapType : vw.ol3.BasemapType.GRAPHIC,
      controlDensity : vw.ol3.DensityType.BASIC,
      interactionDensity : vw.ol3.DensityType.BASIC,
      controlsAutoArrange : true,
      homePosition : vw.ol3.CameraPosition,
      initPosition : vw.ol3.CameraPosition,
    };
    mapController = new vw.MapController(vw.MapControllerOption);

</script>						
</body>									
</html>
