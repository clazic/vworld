<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>sunlightrightsAnalysis</title>
<!-- 지도 로드하기 -->
<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=@{apikey}"></script>
<!--<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=A8A79D9E-3B7A-31F2-8288-637A5F984B7C"></script>-->

<!--분석 기능 로드하기 -->
<script type="text/javascript" src="https://map.vworld.kr/js/dtkmap/tool3d/libapis/sunlightrights/sunlightrights_analysis_api.min.js"></script><!-- 운영_지도 -->
<!-- <script type="text/javascript" src="http://localhost:8082/js/dtkmap/tool3d/libapis/sunlightrights/sunlightrights_analysis_api.js"></script><!-- 로컬_지도-->
</head>

<body>
	<div id="vmap" style="width:100%;height:350px;left:0px;top:0px"></div>

	<div class="" id="toolbar">
	<label for="anaDate">분석날짜  </label><input type="text" id="anaDate" name="anaDate" class="input date" data-bind="value: contourDate, valueUpdate: 'input'"  onchange="sunlightrightsAnalysis.createSunObject()" valCheck="date" fieldTitle="분석날짜"/><br><br>
	<label for="anlysTimeInterval" style="width: 150px;">분석시간간격</label>
    <select class="form-control" id="anlysTimeInterval">
    <option value="15">15분</option>
    <option value="10">10분</option>
    <option value="5">5분</option>
    <option value="1">1분</option>
    </select>
 	<br><br>
 	<dt>시간별 그림자</dt>
	<dd>
		<div class="range">
			<label for="anaTim" style="margin-left: 10px"><span style="float: left; width:15px; text-align:right;" id="time_span" data-bind="text: contourTime"></span>: 00</label>
			<input type="range" id="anaTim" name="anaTim" class="form-control-range" min="5.0" max="20.0" step="1"
			data-bind="value: contourTime, valueUpdate: 'input'"/>
		</div>
	</dd>
	 </div>
	 <br>

	 <button id="btnPoint" class="btn btn-primary">일조권지점 그린후 바로 분석 수행</button>


	<div id = "result" style="margin-top: 20px;">
		<h3>분석 결과</h3>
			<p>일조 <span id="sunshine" style="background:#fafa32; display:inline-block; width:20px; height:20px; margin-right: 10px;"></span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
				   비일조 <span id="noSunshine" style="background:#3323e8; display:inline-block; width:20px; height:20px; margin-right: 10px;"></span></p>
			<p>일출시간 <span id="sunrise_Time">N/A</span>&nbsp;&nbsp;&nbsp; 일몰시간 <span id="sunset_Time">N/A</span></p>
			<p>총 일조량 <span id="total_sunlight_Time">N/A</span>&nbsp;&nbsp;&nbsp; 연속 일조량(최대) <span id="continuous_sunlight_Time">N/A</span></p>
    </div>

<script type="text/javascript">
 function vwmap(){

	var options =   {
			mapId : "vmap",
			initPosition: new vw.CameraPosition(
                new vw.CoordZ(126.923100000039,37.5262083301207,2000),
                new vw.Direction(0, -90, 0)
            ),
			logo: true,
			navigation: false
		};

		var map = new vw.Map();
		map.setOption( options );
		map.start();
  }
  vwmap();
   ////웹지엘 3.0 초기지도 초기화
  document.addEventListener("DOMContentLoaded", function() {
	document.querySelector('#btnPoint').addEventListener("click", function() {
		// 점찍을때 이미지.
		sunlightrightsAnalysis.spotmarkerSunny = "https://map.vworld.kr/js/dtkmap/tool3d/libapis/sunlightrights/sunny.png";
		sunlightrightsAnalysis.spotmarkerS = "https://map.vworld.kr/js/dtkmap/tool3d/libapis/sunlightrights/spotmarkerS.png";
		sunlightrightsAnalysis.drawPointOnMap(function() {

			let inserval = document.getElementById('anlysTimeInterval').value;

			sunlightrightsAnalysis.runSunlightlights(inserval,function(ResultInfo){
				console.log("성공 : " + "clickeddata.selected");
				console.log(ResultInfo);

				document.getElementById("sunrise_Time").innerText = ResultInfo[0].sunrise_Time;
				document.getElementById("sunset_Time").innerText = ResultInfo[1].sunset_Time;
				document.getElementById("total_sunlight_Time").innerText = ResultInfo[2].total_sunlight_Time;
				document.getElementById("continuous_sunlight_Time").innerText = ResultInfo[3].continuous_sunlight_Time;
			});
		});

  	});
  });

 </script>
</body>
</html>
