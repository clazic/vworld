      };
      culHeritAlter = new CulHeritAlter('culHeritAlter1', '문화재 현상변경 분석1', options);
      culHeritAlter.createCulHeritArea(culHeritAreaGeoJSON1, culHeritAreaGeoJSON2, culHeritAreaGeoJSON3);
    }
  });

  // 가상건물 그리기 버튼 클릭
  document.querySelector("#btn_drawVtBuilding").addEventListener("click", function() {
    if(culHeritAlter) {
      removeVirtualBuilding();
      const vbOptions = {
    		  name: 'Test건물', 
    	      floorHeight: Number(10), 
    	      floorCount: Number(2), 
    	      color: '#FF00EE', 
    	      alpha: Number(30), 
    	      roofType: 'RF0001', 
    	      roofHeight: Number(3) 
      };
      culHeritAlter.drawVirtualBuilding(vbOptions
        , (id, virtualBuildingInfo) => { // onEndDrawingCallback 가상건물 그리기 완료 후 콜백 (가상건물정보 ID, 가상건물정보 객체)
          if(virtualBuildingInfo != null) {
            // 지붕구분
            let roofTypeName;
            if(virtualBuildingInfo.virtualBuildingRoofType === 'RF0001') {
              roofTypeName = '평지붕';
            } else {
              roofTypeName = '경사지붕';
            }
            // 결과 테이블 생성
            const tbody = $('#vtBuildingTable');
            let tr = '<tr id="'+id+'">';
            tr += '<td>' + virtualBuildingInfo.virtualBuildingName + '</td>';
            tr += '<td>' + Number(virtualBuildingInfo.virtualBuildingHeight).toFixed(0) + '</td>';
            tr += '<td>' + roofTypeName + '</td>';
            //0109
            tr += '<td>' + '<input type="checkbox" name="objType" class="form-check-input" id="elevationChk" onchange="culHeritAlter.setElevationAngle()">' + 
            						'<h6 class="hide" id="elevationAngleAddHeightNm">적용높이</h6><input type="number" class="hide" style="width:30px;" value="5" id="elevationAngleAddHeight">' + 
            						'<h6 class="hide" id="elevationAngleNm">앙각각도</h6><input type="number" class="hide" style="width:30px;" value="45" id="elevationAngle">' + '</td>'; 
            tr += '<td>' + '<button onclick="removeVirtualBuilding()">삭제</button>' + '</td>';
            tr += '<td>' + '<button onclick="selectElevationAnglePosition(\'' + id + '\')">분석<small><br>*앙각유무 체크시, 지점선택후 자동분석</small></button>' + '</td>';
            tr += '</tr>';
            
            tbody.append(tr);
          }
      });
    } else {
      alert('문화재 공간 정보가 존재하지 않습니다.');
    }
  });

  // 현상변경 분석 수행 버튼 클릭  
  const analyzeCulHeritAlter = () => {
    if(culHeritAlter) {
      loadingWithMask();
      $('#wsLoadingIndicator').css('display', 'block');
      
      culHeritAlter.analyzeCulHeritAlter((virtualBuildingInfoMap)=> {
        // 결과 테이블 초기화
        const tbody = $('#resultTable');
        tbody.empty();
        if(virtualBuildingInfoMap) {
          virtualBuildingInfoMap.forEach((virtualBuildingInfo, id) => {
            if(virtualBuildingInfo != null) {
              // 지붕구분
              let roofTypeName;
              if(virtualBuildingInfo.virtualBuildingRoofType === 'RF0001') {
                roofTypeName = '평지붕';
              } else {
                roofTypeName = '경사지붕';
              }
              // 고도제한 값
              const altitudeLimitValue = virtualBuildingInfo.altitudeLimit || '없음';
              // 앙각규정 값
              const elevationAngleValue = virtualBuildingInfo.elevationAngle || '없음';
              // 문화재 구역 명칭
              const zoneName = virtualBuildingInfo.zoneName || '없음';
              // 현상변경 허가 여부
              let alterApproval;
              if(virtualBuildingInfo.altitudeLimitApproval && virtualBuildingInfo.elevationAngleApproval) {
                alterApproval = '<span style="color: #0c75d2">가능</span>';
              } else {
                alterApproval = '<span style="color: #9d2118">불가</span>';
              }
              let tr = '<tr id="'+id+'_result'+'">';
              tr += '<td>' + virtualBuildingInfo.virtualBuildingName + '</td>';
              tr += '<td>' + Number(virtualBuildingInfo.virtualBuildingHeight).toFixed(0) + '</td>';
              tr += '<td>' + roofTypeName + '</td>';
              tr += '<td>' + altitudeLimitValue
                + '<input type="checkbox" class="form-check-input" onchange="altitudeLimitVisibility(\''+id+'\',this)">'
                + '</td>';
              tr += '<td>' + elevationAngleValue
                + '<input type="checkbox" class="form-check-input" onchange="elevationAngleVisibility(\''+id+'\',this)">'
                + '</td>';
              tr += '<td>' + zoneName + '</td>';
              tr += '<td>' + alterApproval + '</td>';
              tr += '</tr>';
              tbody.append(tr);
            }
          });
        }
      });
    } else {
      alert('문화재 공간 정보가 존재하지 않습니다.');
    }
  };

  // 초기화 버튼 클릭
  document.querySelector("#btn_initCulHeritAlter").addEventListener("click", function() {
    if(culHeritAlter) {
      culHeritAlter.initCulHeritAlter();
      const resultTable = $("#resultTable");
      resultTable.empty(); // 테이블 초기화
      const vtBuildingTable = $("#vtBuildingTable");
      vtBuildingTable.empty(); // 테이블 초기화
    }
  });


  const selectElevationAnglePosition = (id) => {

		  //사용자가 입력한 허용기준정보
		  let altitudeLimit = document.getElementById("altitudeLimit").value;   // 고도제한
		  let elevationChk = document.getElementById('elevationChk').checked ? 'on' : 'off';  //앙각유뮤 : on / off
		  let elevationAngleAddHeight = document.getElementById("elevationAngleAddHeight").value;  // 기준점에서의 앙각적용 높이
		  let elevationAngle = document.getElementById("elevationAngle").value; // 앙각각도
		  
	  // 해당 분석결과 제거
	     //$('#' + id + '_result').remove(); 임시주석
	     // 기준 변경 옵션
	     const changeCriteriaOptions = {};
	     changeCriteriaOptions[culHeritAlter.elevationAngleFieldName] = Number(elevationAngle); // 앙각각도
	     changeCriteriaOptions[culHeritAlter.elevationAngleAddHeightFieldName] = Number(elevationAngleAddHeight); // 기준점 앙각적용 높이
	     changeCriteriaOptions[culHeritAlter.altitudeLimitFieldName] = Number(altitudeLimit); // 고도제한
	     changeCriteriaOptions[culHeritAlter.elevationChk] = elevationChk; // 앙각유무 체크
	     //culHeritAlter.setCulHeritAlterCriteria(id, changeCriteriaOptions);
	     culHeritAlter.setCulHeritAlterCriteria(id, changeCriteriaOptions, elevationChk,callback =>{		 
	    	 analyzeCulHeritAlter();
	     });  
   }

    // 가상건물 삭제 버튼 클릭
    const removeVirtualBuilding = () => {
    	culHeritAlter.virtualBuildingInfoMap.forEach((value, key) => {         
            culHeritAlter.removeVirtualBuildingById(key);
            $('#' + key).remove();
            $('#' + key + '_result').remove();
      });    
    }

    // 앙각규정 가시화 수행
    const elevationAngleVisibility = (id, chkInfo) => {
      culHeritAlter.elevationAngleVisibilityByInfoId(id, chkInfo.checked);
    }

    // 고도제한 가시화 수행
    const altitudeLimitVisibility = (id, chkInfo) => {
      culHeritAlter.altitudeLimitVisibilityByInfoId(id, chkInfo.checked);
    }
    
    //유효값 : 고도제한, 앙각, 앙각높이
    var regex = /^-?(?:\d+|\d)$/; // /^[0-9]+\.?[0-9]+$/;
    
    $("#altitudeLimit").on("focusout keyup", function(){
    	var v = $(this).val();
    	if(v.length > 0){
    		if(v < 0 || v > 100 || regex.test(v) == false){
    			alert('1~100 사이의 값을 입력하세요.','',function(){});
    			v = "";
    		}		
    		$(this).val(v);
    		setTimeout(function(){$(this).focus();},1);			
    	}
    });

    $("#vtBuildingTable").on("focusout keyup", "#elevationAngleAddHeight", function(){
    	var v = $(this).val();
    	if(v.length > 0){
    		if(v < 0 || v > 100 || regex.test(v) == false){
    			alert('1~100 사이의 값을 입력하세요.','',function(){});
    			v = "";
    		}		
    		$(this).val(v);
    		setTimeout(function(){$(this).focus();},1);			
    	}
    });

    $("#vtBuildingTable").on("focusout keyup", "#elevationAngle", function(){
    	var v = $(this).val();
    	if(v.length > 0){
    		if(v < 0 || v > 89 || regex.test(v) == false){
    			alert('1~89 사이의 값을 입력하세요.','',function(){});
    			v = "";
    		}		
    		$(this).val(v);
    		setTimeout(function(){$(this).focus();},1);			
    	}
    });
</script>
</body>
</html>
