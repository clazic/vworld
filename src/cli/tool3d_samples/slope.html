<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>slopeAnalysis</title>
<!-- 지도 로드하기 -->
<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=@{apikey}"></script>
<!--<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=A8A79D9E-3B7A-31F2-8288-637A5F984B7C"></script>-->

<!-- 분석 기능 로드하기 -->
<script type="text/javascript" src="https://map.vworld.kr/js/dtkmap/tool3d/libapis/slope/slope_analysis_api.js"></script><!-- 운영_지도-->
</head>

<body>
	<div id="vmap" style="width:100%;height:350px;left:0px;top:0px"></div>
	
	
	<label for="area" style="width: 150px;">분석영역넓이: </label>
    <select class="form-control" id="area">
    <option value="10000">10,000 ㎡</option>
    <option value="50000">50,000 ㎡</option>
    <option value="100000">100,000 ㎡</option>
    </select><br>
    
    <button id="btnSlopByPoint" class="btn btn-primary">경사도 포인트 지정 후 바로 분석 수행</button><br><br>
	<button id="btnSlopByPolygon" class="btn btn-primary">경사도 분석 영역 그린 후 바로 분석 수행</button><br>
	
	
	<div id = "slopeResult" style="margin-top: 20px;">
		<h3>분석 결과:</h3>
			<p>클릭여부: <span id="selected">N/A</span></p>
		    <p>경사각(˚): <span id="selectAngle">N/A</span></p>
		    <p>경사도(%): <span id="selectGradient">N/A</span></p><br>
   </div>
   
   

<script type="text/javascript">
 function vwmap(){

	var options =   {
			mapId : "vmap",
			initPosition: new vw.CameraPosition(
                new vw.CoordZ(126.923100000039,37.5262083301207,2000),
                new vw.Direction(0, -90, 0)
            ),
			logo: true,
			navigation: false
		};

		var map = new vw.Map();
		map.setOption( options );			
		map.start();
  }
  vwmap();
   ////웹지엘 3.0 초기지도 초기화
  var imgspoturl = "https://map.vworld.kr/js/dtkmap/tool3d/libapis/slope/spotmarkerS.png";
  document.addEventListener("DOMContentLoaded", function() {
	document.querySelector('#btnSlopByPolygon').addEventListener("click", function() {
		slopeAnalysis.startDrawingPolygon(function() {
			
			slopeAnalysis.analysisSlopeByAreaStart(function(clickeddata){
				console.log("클릭여부 : " + clickeddata.selected);
				console.log("경사각 : " + clickeddata.selectAngle);
                console.log("경사도 : " + clickeddata.selectGradient);
              	//0107
                document.getElementById("selected").innerText = clickeddata.selected;
                document.getElementById("selectAngle").innerText = clickeddata.selectAngle;
                document.getElementById("selectGradient").innerText = clickeddata.selectGradient;
			},
			function(alnalresult) {
				console.log("분석결과");
				console.log(alnalresult);
			});
		});	
  	});
	document.querySelector('#btnSlopByPoint').addEventListener("click", function() {
		// 점찍을때 이미지.
		slopeAnalysis.spotmarkerS =  "https://map.vworld.kr/js/dtkmap/tool3d/libapis/slope/spotmarkerS.png";
		slopeAnalysis.getPoint(function() {
			
			let area = document.getElementById('area').value; //미터.찍은점으로부터 
			
			slopeAnalysis.analysisSlopeByPointStart(area, function(clickeddata){
				console.log("클릭여부 : " + clickeddata.selected);
				console.log("경사각 : " + clickeddata.selectAngle);
                console.log("경사도 : " + clickeddata.selectGradient);
                
                document.getElementById("selected").innerText = clickeddata.selected;
                document.getElementById("selectAngle").innerText = clickeddata.selectAngle;
                document.getElementById("selectGradient").innerText = clickeddata.selectGradient;
			},
			function(alnalresult) {
				console.log("분석결과");
				console.log(alnalresult);
			});
		});	
  	});

 
  });
 </script>
</body>
</html>
