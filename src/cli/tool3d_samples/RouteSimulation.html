<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RouteSimulation</title>
<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=@{apikey}"></script>

<!--<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=A8A79D9E-3B7A-31F2-8288-637A5F984B7C"></script>-->

<script src="https://map.vworld.kr/js/dtkmap/tool3d/libapis/routeSim/routeSim_analysis_api.js"></script><!-- 운영 -->
</head>

<body>
	<div id="vmap" style="width:100%;height:350px;left:0px;top:0px"></div>
	<div class="col-md-2">
	    <label style="width: 150px;">객체 타입 선택</label>
	    <div class="form-check">
	        <input type="radio" name="objType" class="form-check-input" id="droneObj" value="DRONE" checked>
	        <label class="form-check-label" for="droneObj">드론</label>
	        <input type="radio" name="objType" class="form-check-input" id="vehicleObj" value="VEHICLE">
	        <label class="form-check-label" for="vehicleObj">차량</label>
	    </div>
	    <label for="cameraMode" style="width: 150px;">주행모드</label>
	    <select class="form-control" id="cameraMode" onchange="cameraLookAt()">
	        <option value="tpView">3인칭</option>
	        <option value="fpView">1인칭</option>
	    </select>
	    <label for="cameraLookAt">카메라 고정</label>
	    <input type="checkbox" class="form-check-input" id="cameraLookAt" onchange="cameraLookAt();">
	
	    <div class="col-md-2">
	        <div class="form-group">
	            <label for="routeElevation" style="width: 150px;">해발고도(m)</label>
	            <input type="number" class="form-control" id="routeElevation" value="120" onchange="updateElevation(this.value)">
	            <label for="objSpeed" style="width: 150px;">주행속도(km/h)</label>
	            <input type="number" class="form-control" id="objSpeed" value="50" onchange="updateSpeed(this.value)">
	        </div>
	    </div>
	
	    <div class="col-md-2">
	        <div class="form-group">
	            <label for="objScale" style="width: 150px;">모델url</label>
	            <input type="text" class="form-control" id="drivingSampleModel" value="https://map.vworld.kr/data/dtkmap/tool3d/routeSim/pur_drone.glb" onchange="updateTool(this.value,document.getElementById('objScale').value)">
	            <label for="objScale" style="width: 150px;">스케일</label>
	            <input type="number" class="form-control" id="objScale" value="1" onchange="updateScale(this.value)">
	            <label for="objColor" style="width: 150px;">색상</label>
	            <input type="color" class="form-control" id="objColor" value="#fff700" onchange="updateColor(this.value)">
	        </div>
	    </div>
	
	    <div class="col-md-2">
	        <div class="form-group">
	            <label for="droneViewAngle" style="width: 150px;">드론 카메라 각도</label>
	            <input type="number" class="form-control" id="droneViewAngle" value="65" onchange="updateDroneViewAngle(this.value)">
	        </div>
	    </div>
	
	    <div class="col-md-2">
	        <div class="form-group">
	            <label style="width: 150px;">카메라뷰 변경</label>
	            <button id="setCameraFrontView_btn" class="btn btn-secondary" onclick="setCameraView('FRONT')">앞면</button>
	            <button id="setCameraBackView_btn" class="btn btn-secondary" onclick="setCameraView('BACK')">뒷면</button>
	            <button id="setCameraLeftView_btn" class="btn btn-secondary" onclick="setCameraView('LEFT')">좌측</button>
	            <button id="setCameraRightView_btn" class="btn btn-secondary" onclick="setCameraView('RIGHT')">우측</button>
	        </div>
	    </div>
	    <div class="col-md-2">
	        <div class="form-check" id="droneRouteForm">
	            <input type="radio" name="droneRouteForm" class="form-check-input" id="droneRouteFormTube" value="tube" checked>
	            <label class="form-check-label" for="droneRouteFormTube">원통형</label>
	            <input type="radio" name="droneRouteForm" class="form-check-input" id="droneRouteFormLine" value="line">
	            <label class="form-check-label" for="droneRouteFormLine">선형</label>
	        </div>
	    </div>
	
	    <div class="col-md-2">
	        <div class="form-group">
	            <label for="droneViewAngle" style="width: 150px;">드론 카메라 각도</label>
	            <input type="number" class="form-control" id="droneViewAngle" value="65" onchange="updateDroneViewAngle(this.value)">
	        </div>
	    </div>
	    <div class="col-md-2">
	        <div class="form-check" id="crashEventOption">
	            <label style="width: 150px;">충돌 활성화</label>
	            <input type="radio" name="crashEventOption" class="form-check-input" id="crashAllow" value="true" checked>
	            <label class="form-check-label" for="crashAllow">허용</label>
	            <input type="radio" name="crashEventOption" class="form-check-input" id="crashIgnore" value="false">
	            <label class="form-check-label" for="crashIgnore">무시</label>
	        </div>
	    </div>
	    <div class="col-md-3" style="height: 180px; overflow-y: scroll">
          <table class="table table-hover">
            <thead>
            <tr>
              <th style="width: 60%">충돌지점</th>
              <th style="width: 40%">위치확인</th>
            </tr>
            </thead>
            <tbody id="crashPosition">
            </tbody>
          </table>
        </div>
	    
	</div>	
	<div class="col-md-2">
        <div class="form-group">
            <label for="routeGeoJSONTextarea" style="width: 150px;">경로정보 GeoJSON 입력 (EPSG:4326)</label>
            <textarea class="form-control" id="routeGeoJSONTextarea" rows="4" ></textarea>
        <button id="createRouteFromGeoJSON_btn" class="btn btn-success" onclick="createRouteFromGeoJSON()">경로그리기(GeoJSON)</button>           
        </div>
    </div>
	<button id="createRoute_btn" class="btn btn-success" onclick="createRoute()">경로그리기</button>
    <button id="playRouteSim_btn" class="btn btn-primary" onclick="playRouteSim()">모의주행 시작</button>
    <button id="pauseRouteSim_btn" class="btn btn-default" onclick="pauseRouteSim()">모의주행 일시정지</button>
    <button id="resumeRouteSim_btn" class="btn btn-default" onclick="resumeRouteSim()">모의주행 재시작</button>
    <button id="initRouteSim_btn" class="btn btn-default" onclick="initRouteSim()">모의주행 초기화</button>

//경로 그리기 수행
  function createRoute() {
      // 모의주행 타입 (DRONE OR VEHICLE)
      const objType = $("input[name='objType']:checked").val();
      // 경로 해발고도
      const routeElevationElement = document.getElementById('routeElevation');
      // 이미 만들어진 객체 없으면 신규 생성
      if(!routeSimObject) {
        routeSimObject = new RouteSimulation('routeSimObject1', 'routeSimObject1', objType);
      } else {
        routeSimObject.type = objType;
      }
      // 지도에 경로 생성 시작
      routeSimObject.startDrawingRoute(routeElevationElement);
  }

  // GeoJSON 으로 경로 생성
  function createRouteFromGeoJSON() {
    // 모의주행 타입 (DRONE OR VEHICLE)
    const objType = $("input[name='objType']:checked").val();
    // 입력된 GeoJSON 문자열을 불러와 객체 생성
    const routeGeoJSONStr = $('#routeGeoJSONTextarea').val();
    let routeGeoJSONObject;
    try {
      routeGeoJSONObject = JSON.parse(routeGeoJSONStr);
    } catch (e) {
      alert('GeoJSON 형식이 아닙니다.');
    }
    // 이미 만들어진 객체 없으면 신규 생성
    if(!routeSimObject) {
      routeSimObject = new RouteSimulation('routeSimObject1', 'routeSimObject1', objType);
    } else {
      routeSimObject.type = objType;
    }
    // GeoJSON 객체로 경로 생성
    routeSimObject.createRouteByGeoJSON(routeGeoJSONObject);
  }

  // 저장된 지점을 기반으로 모의주행 수행
  function playRouteSim() {
    if (routeSimObject) {
        routeSimObject.alertEnabled = document.querySelector('input[name="crashEventOption"]:checked').value == "true";
        $('#crashPosition').empty(); // 테이블 결과 초기화
        // 충돌 발생시 처리 이벤트 생성
        
            routeSimObject.modelCrashEventCallBackFn = (position) => {
            	if (routeSimObject.alertEnabled) {
                // 충돌위치에 점 생성
                var crashPoint = ws3d.viewer.entities.add({
                    position: position,
                    point: {
                        pixelSize: 20,
                        color: ws3d.common.Color.BLUE,
                        outlineColor: ws3d.common.Color.WHITE,
                        outlineWidth: 1,
                        heightReference: 0,
                        disableDepthTestDistance: Number.POSITIVE_INFINITY
                    },
                });
                crashPointEntities.push(crashPoint);
             	// ECEF -> WGS84 (위도, 경도, 고도) 변환
                const cartographic = ws3d.common.Cartographic.fromCartesian(crashPoint.position.getValue());
                // 위도, 경도, 고도를 얻기
                const longitude = cartographic.longitudeDD; // 경도 (degree)
                const latitude = cartographic.latitudeDD; // 위도 (degree)
                const height = cartographic.height; // 고도 (미터 단위)
                
                /* const newDiv = document.createElement('div');
                const newText = document.createTextNode(longitude + "<br/>" + latitude + "<br/>" + height);
	            newDiv.appendChild(newText);  */
	            
	            const crashPosition = $('#crashPosition');
	            
	              let tr = "<tr>";
	              tr += "<td style='width: 60%'>" + longitude + "<br/>" + latitude + "<br/>" + height + "</td>";	              
	              tr += "<td style='width: 40%'>" + "<button onclick='selectCrashPoint(" + longitude + "," + latitude + "," + height + ")'>위치 확인</button>" + "</td>";
	              tr += "</tr>";
	              crashPosition.append(tr);
	            
                pauseRouteSim(); // 재생중지
            }
        }
        const speed = 50; //Number($('#objSpeed').val());
        const scale = 3; //Number($('#objScale').val());
        const color = '#FFFFFF'; //$('#objColor').val();
        const droneViewAngle = 65; //Number($('#droneViewAngle').val());
        routeSimObject.modelUrl = $('#drivingSampleModel').val();

        routeSimObject.playRouteSimulation(speed, scale, color, droneViewAngle);
    } else {
        alert('생성된 경로 정보가 존재하지 않습니다.');
    }
}

  // 모의주행 객체로 카메라 고정 수행
  function cameraLookAt() {
    if(routeSimObject) {
      const isChk = $('#cameraLookAt').prop('checked');
      const type = $('#cameraMode').val();
      routeSimObject.trackedModel(type, isChk);
    }
  }

//모의주행 기능 재시작
  function resumeRouteSim() {
    if(routeSimObject) {
      routeSimObject.resumeRouteSimulation();
    }
  }

  // 모의주행 기능 일시정지
  function pauseRouteSim() {
    if(routeSimObject) {
      routeSimObject.pauseRouteSimulation();
    }
  }

  // 고도값 업데이트
  function updateElevation(elevation) {
    if(routeSimObject) {
      routeSimObject.updateRouteElevation(Number(elevation));
    }
  }

  // 주행속도 업데이트
  function updateSpeed(speed) {
    if(routeSimObject) {
      routeSimObject.updateRouteSpeed(Number(speed));
    }
  }

  // 스케일 값 업데이트
  function updateScale(scale) {
    if(routeSimObject) {
      routeSimObject.updateModelScale(Number(scale));
    }
  }

  // 색상 업데이트
  function updateColor(color) {
    if(routeSimObject) {
      routeSimObject.updateModelColor(color);
    }
  }

  function updateDroneViewAngle(angle) {
    if(routeSimObject) {
      routeSimObject.updateDroneViewAngle(angle);
    }
  }

  // 카메라 뷰 세팅
  function setCameraView(viewType) {
    if(routeSimObject) {
      let cameraHeadingOffsetValue = 0;
      if(viewType === 'FRONT') {
        cameraHeadingOffsetValue = 0;
      } else if(viewType === 'BACK') {
        cameraHeadingOffsetValue = 180;
      } else if(viewType === 'LEFT') {
        cameraHeadingOffsetValue = 90;
      } else {
        cameraHeadingOffsetValue = 270;
      }
      // 카메라 뷰 방향 세팅
      routeSimObject.setCameraTrackViewHeadingOffset(cameraHeadingOffsetValue);
    }
  }

	//기기 업데이트
  function updateTool(tool,scale) {
    if(routeSimObject) {
      routeSimObject.updateModelTool(tool,scale);
    }
  }
  
  // 초기화
  function initRouteSim() {
    if(routeSimObject) {
      routeSimObject.initRouteSimulation();
      $('#crashPosition').empty();
    }
  }
  //드론 라인유형(line,tube)
  $('#droneRouteForm input[type="radio"]').change(function(){	
      var selectValue = $(this).val();
   	// 이미 만들어진 객체 없으면 신규 생성
      if(routeSimObject) {
      	routeSimObject.droneRouteForm = selectValue;
      	routeSimObject.createDroneRouteTubeEntity();
      } 
  });
   
  //충돌 활성화여부
  $('#crashEventOption input[type="radio"]').change(function(){	
   	// 이미 만들어진 객체 없으면 신규 생성
      if(routeSimObject) {
    	  routeSimObject.alertEnabled = document.querySelector('input[name="crashEventOption"]:checked').value == "true";
      } 
  });
  
  //충돌 위치 확인 (확인용)
  function selectCrashPoint(x,y,z) {
    modelOriginPoint = new ws3d.common.OgcPoint(x, y, z);
    ws3d.viewer.navigation.flyTo(modelOriginPoint, {
        distance: 100,
        duration: 0.5
      });
  }
 
  </script>
