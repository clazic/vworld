<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Heatmap</title>

<!-- vWorld 3D -->
<script type="text/javascript" src="https://map.vworld.kr/js/webglMapInit.js.do?version=3.0&apiKey=@{apikey}"></script>
<!-- heatmap JS 추가 -->
<script src="https://map.vworld.kr/js/dtkmap/tool3d/libapis/heatmap/heatmap_api.js"></script>

</head>
<body>
  <div id="vmap" style="width:100%;height:350px;left:0px;top:0px"></div>
  <button id="heatmapBtn">히트맵 가시화</button>
  <div id="result" style="margin-top: 20px;">
    <h3>분석 결과:</h3>
  </div>

<script>
  let vworldMap;
  let heatmapApi;     
  let heatmapOn = false;

  function vwmap() {
    const options = {
      mapId : "vmap",
      initPosition: new vw.CameraPosition(
        new vw.CoordZ(126.923100000039,37.5262083301207,2000),
        new vw.Direction(0, -90, 0)
      ),
      logo: true,
      navigation: false
    };
    vworldMap = new vw.Map();
    vworldMap.setOption(options);
    vworldMap.start();
  }

  vwmap();

  window.addEventListener("load", function () {
    heatmapApi = new HeatmapSingleImage3D("seoulHeatmap", {
      wmsKey  : "767B7ADF-10BA-3D86-AB7E-02816B5B92E9",
      wmsLayer: "lt_p_dgmuseumart",   // 기본 레이어명
      wmsStyle: "dt3d_heatmap",       // 기본 스타일명
      domain  : "localhost:8080"
    });

    const btn = document.getElementById("heatmapBtn");
    if (!btn) return;

    btn.addEventListener("click", function () {
      if (!heatmapOn) {
        heatmapApi.addSingleImageLayer({
          minX: 126.212982177734,
          minY: 33.2136306762695,
          maxX: 129.404647827148,
          maxY: 38.5076026916504,
          limitPixelWidth: 2048,
        }).then(() => {
          heatmapOn = true;
          document.getElementById("result").innerHTML =
            "<h3>분석 결과:</h3><p>히트맵 단일이미지 ON</p>";
        }).catch(err => {
          console.error(err);
        });
      } else {
        heatmapApi.removeLayer();
        heatmapOn = false;
        document.getElementById("result").innerHTML =
          "<h3>분석 결과:</h3><p>히트맵 단일이미지 OFF</p>";
      }
    });
  });
</script>
</body>
</html>
